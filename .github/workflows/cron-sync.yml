name: Sincronización Automática vTools
on:
  schedule:
    # Se ejecuta todos los lunes a las 02:00 AM UTC
    - cron: "0 2 * * 1"
  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub

jobs:
  ping_api:
    runs-on: ubuntu-latest
    steps:
      - name: Llamar a la API de Sincronización
        run: |
          curl -X POST https://ras-uady.ras-fiuady.workers.dev/api/sync \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          -H "Content-Type: application/json"
